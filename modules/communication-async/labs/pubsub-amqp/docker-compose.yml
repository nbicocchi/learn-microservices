services:
  publisher:
    build: publisher-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EXCHANGE_NAME=myExchange
    depends_on:
      lavinmq:
        condition: service_healthy

  subscriber-1:
    build: subscriber-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EXCHANGE_NAME=myExchange
      - QUEUE_NAME=queue.1
      - ROUTING_KEY=money.#
    depends_on:
      lavinmq:
        condition: service_healthy

  subscriber-2:
    build: subscriber-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EXCHANGE_NAME=myExchange
      - QUEUE_NAME=queue.1
      - ROUTING_KEY=money.#
    depends_on:
      lavinmq:
        condition: service_healthy

  subscriber-3:
    build: subscriber-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EXCHANGE_NAME=myExchange
      - QUEUE_NAME=queue.1
      - ROUTING_KEY=money.#
    depends_on:
      lavinmq:
        condition: service_healthy

  lavinmq:
    image: cloudamqp/lavinmq:latest
    ports:
      - 5672:5672
      - 15672:15672
    healthcheck:
      test: [ "CMD", "lavinmqctl", "status" ]
      interval: 5s
      timeout: 2s
      retries: 60
